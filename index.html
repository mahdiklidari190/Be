    <style>
        /* ===== CSS RESET & VARIABLES ===== */
        :root {
            --primary-color: #022c22;
            --secondary-color: #064e3b;
            --accent-color: #d4af37;
            --accent-light: #fbbf24;
            --accent-bright: #fcd34d;
            --text-light: rgba(255, 255, 255, 0.9);
            --text-muted: rgba(255, 255, 255, 0.7);
            --shadow-gold: rgba(212, 175, 55, 0.3);
            --shadow-gold-strong: rgba(212, 175, 55, 0.6);
            --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --border-radius: 50%;
            --spacing-xs: 0.5rem;
            --spacing-sm: 1rem;
            --spacing-md: 2rem;
            --spacing-lg: 3rem;
            --spacing-xl: 4rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 50%, var(--primary-color) 100%);
            overflow-x: hidden;
            position: relative;
            line-height: 1.6;
            color: var(--text-light);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ===== ACCESSIBILITY ===== */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* ===== BACKGROUND PARTICLES ===== */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.25;
            z-index: 0;
            animation: float 8s ease-in-out infinite;
            pointer-events: none;
        }

        body::before {
            width: 350px;
            height: 350px;
            background: var(--accent-color);
            top: -150px;
            right: -150px;
        }

        body::after {
            width: 300px;
            height: 300px;
            background: var(--accent-light);
            bottom: -100px;
            left: -100px;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { 
                transform: translateY(0) scale(1); 
                opacity: 0.25;
            }
            50% { 
                transform: translateY(-40px) scale(1.08); 
                opacity: 0.35;
            }
        }

        /* ===== HEADER ===== */
        header {
            position: relative;
            z-index: 10;
            padding: var(--spacing-sm) var(--spacing-md);
            background: rgba(2, 44, 34, 0.5);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-light);
        }

        .logo-icon {
            font-size: 1.5rem;
        }

        /* ===== MAIN CONTENT ===== */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: var(--spacing-md) var(--spacing-sm);
            position: relative;
            z-index: 1;
        }

        /* ===== HERO SECTION ===== */
        .hero-section {
            animation: fadeInDown 1s ease-out;
            max-width: 800px;
            margin-bottom: var(--spacing-lg);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-title {
            font-size: clamp(1.8rem, 5vw, 3rem);
            background: linear-gradient(135deg, var(--accent-light), var(--accent-color), #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: var(--spacing-sm);
            font-weight: 900;
            line-height: 1.3;
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% {
                filter: drop-shadow(0 0 10px var(--shadow-gold));
            }
            50% {
                filter: drop-shadow(0 0 25px var(--shadow-gold-strong));
            }
        }

        .hero-subtitle {
            color: var(--text-muted);
            font-size: clamp(1rem, 3vw, 1.25rem);
            max-width: 600px;
            margin: 0 auto;
            line-height: 2;
            animation: fadeIn 1.5s ease-out 0.3s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* ===== BUTTONS SECTION ===== */
        .buttons-section {
            position: relative;
            z-index: 1;
            padding: var(--spacing-md) var(--spacing-sm) var(--spacing-xl);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(2rem, 6vw, 5rem);
            flex-wrap: wrap;
            animation: fadeInUp 1s ease-out 0.5s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== ROUND BUTTON ===== */
        .round-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            transition: all 0.4s var(--transition-bounce);
            cursor: pointer;
            animation: bounceIn 0.8s ease-out;
            position: relative;
        }

        .round-btn:nth-child(1) {
            animation-delay: 0.6s;
        }

        .round-btn:nth-child(2) {
            animation-delay: 0.8s;
        }

        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0.3);
            }
            50% {
                opacity: 1;
                transform: scale(1.05);
            }
            70% {
                transform: scale(0.9);
            }
            100% {
                transform: scale(1);
            }
        }

        .round-btn:hover {
            transform: translateY(-12px) scale(1.05);
        }

        .round-btn:active {
            transform: translateY(-6px) scale(1.02);
        }

        /* ===== BUTTON CIRCLE ===== */
        .btn-circle {
            width: clamp(130px, 28vw, 200px);
            height: clamp(130px, 28vw, 200px);
            border-radius: var(--border-radius);
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(251, 191, 36, 0.08));
            border: 3px solid rgba(212, 175, 55, 0.4);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: 
                0 0 40px var(--shadow-gold),
                inset 0 0 40px rgba(212, 175, 55, 0.1);
        }

        .btn-circle::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                transparent, 
                rgba(212, 175, 55, 0.25), 
                transparent 30%
            );
            animation: rotate 4s linear infinite;
        }

        .btn-circle::after {
            content: '';
            position: absolute;
            inset: 4px;
            border-radius: var(--border-radius);
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            z-index: 1;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        .btn-icon {
            position: relative;
            z-index: 2;
            font-size: clamp(3rem, 7vw, 4rem);
            transition: all 0.3s ease;
            filter: drop-shadow(0 2px 10px rgba(0, 0, 0, 0.3));
        }

        .round-btn:hover .btn-circle {
            border-color: rgba(251, 191, 36, 0.7);
            box-shadow: 
                0 0 60px rgba(212, 175, 55, 0.5),
                inset 0 0 50px rgba(212, 175, 55, 0.2);
        }

        .round-btn:hover .btn-icon {
            transform: scale(1.25) rotate(5deg);
            filter: drop-shadow(0 0 15px rgba(251, 191, 36, 0.9));
        }

        .btn-label {
            margin-top: var(--spacing-sm);
            color: var(--accent-light);
            font-size: clamp(0.95rem, 2.8vw, 1.2rem);
            font-weight: 700;
            text-align: center;
            text-shadow: 0 2px 15px rgba(0, 0, 0, 0.6);
            transition: all 0.3s ease;
        }

        .round-btn:hover .btn-label {
            color: var(--accent-bright);
            text-shadow: 0 0 20px rgba(252, 211, 77, 0.6);
            transform: translateY(-6px);
        }

        /* ===== PULSE ANIMATION ===== */
        @keyframes pulse {
            0%, 100% {
                box-shadow: 
                    0 0 40px var(--shadow-gold),
                    inset 0 0 40px rgba(212, 175, 55, 0.1);
            }
            50% {
                box-shadow: 
                    0 0 50px rgba(212, 175, 55, 0.4),
                    inset 0 0 50px rgba(212, 175, 55, 0.18);
            }
        }

        .btn-circle {
            animation: pulse 3s ease-in-out infinite;
        }

        /* ===== FOOTER ===== */
        footer {
            position: relative;
            z-index: 10;
            padding: var(--spacing-sm) var(--spacing-md);
            background: rgba(2, 44, 34, 0.6);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            text-align: center;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .footer-content a {
            color: var(--accent-light);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-content a:hover {
            color: var(--accent-bright);
        }

        /* ===== RESPONSIVE - MOBILE ===== */
        @media (max-width: 480px) {
            :root {
                --spacing-md: 1.5rem;
                --spacing-lg: 2rem;
                --spacing-xl: 2.5rem;
            }

            .buttons-section {
                flex-direction: column;
                gap: 2.5rem;
                padding: var(--spacing-sm) var(--spacing-sm) var(--spacing-md);
            }

            .btn-circle {
                width: 140px;
                height: 140px;
            }

            .round-btn:hover {
                transform: translateY(-6px) scale(1.03);
            }

            .hero-section {
                margin-bottom: var(--spacing-md);
            }

            .header-content {
                flex-direction: column;
                gap: var(--spacing-xs);
            }

            .logo {
                font-size: 1rem;
            }
        }

        /* ===== RESPONSIVE - TABLET ===== */
        @media (min-width: 481px) and (max-width: 768px) {
            .buttons-section {
                gap: 3rem;
            }
        }

        /* ===== RESPONSIVE - DESKTOP ===== */
        @media (min-width: 769px) {
            .hero-section {
                margin-bottom: var(--spacing-xl);
            }

            .buttons-section {
                padding: var(--spacing-lg) var(--spacing-md) var(--spacing-xl);
            }
        }

        /* ===== SAFE AREA FOR iOS ===== */
        @supports (padding: max(0px)) {
            header {
                padding-top: max(var(--spacing-sm), env(safe-area-inset-top));
                padding-left: max(var(--spacing-md), env(safe-area-inset-left));
                padding-right: max(var(--spacing-md), env(safe-area-inset-right));
            }

            footer {
                padding-bottom: max(var(--spacing-sm), env(safe-area-inset-bottom));
            }
        }

        /* ===== TOUCH DEVICES ===== */
        @media (hover: none) and (pointer: coarse) {
            .round-btn:active .btn-circle {
                border-color: rgba(251, 191, 36, 0.7);
                box-shadow: 
                    0 0 60px rgba(212, 175, 55, 0.5),
                    inset 0 0 50px rgba(212, 175, 55, 0.2);
            }

            .round-btn:active .btn-icon {
                transform: scale(1.15) rotate(3deg);
            }

            .round-btn:active .btn-label {
                color: var(--accent-bright);
            }

            .btn-circle {
                animation: none;
            }
        }

        /* ===== REDUCED MOTION ===== */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* ===== FOCUS STATES FOR ACCESSIBILITY ===== */
        .round-btn:focus {
            outline: 3px solid var(--accent-light);
            outline-offset: 5px;
            border-radius: 10px;
        }

        .round-btn:focus:not(:focus-visible) {
            outline: none;
        }

        /* ===== PRINT STYLES ===== */
        @media print {
            body {
                background: white;
                color: black;
            }

            .btn-circle,
            .btn-icon,
            body::before,
            body::after {
                display: none;
            }

            .hero-title,
            .btn-label {
                color: black;
                -webkit-text-fill-color: black;
            }
        }
    </style>
</head>
