<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>یادبود خانوادگی کلیدری</title>
    
    <!-- فونت وزیرمتن -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.0.0/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: linear-gradient(135deg, #022c22 0%, #064e3b 50%, #022c22 100%);
            overflow-x: hidden;
            position: relative;
        }

        /* === ذرات تزئینی پس‌زمینه === */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            z-index: 0;
            animation: float 8s ease-in-out infinite;
        }

        body::before {
            width: 300px;
            height: 300px;
            background: #d4af37;
            top: -100px;
            right: -100px;
        }

        body::after {
            width: 250px;
            height: 250px;
            background: #fbbf24;
            bottom: -80px;
            left: -80px;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        /* === بخش بالایی صفحه === */
        .top-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem 1rem;
            position: relative;
            z-index: 1;
        }

        .top-section h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            background: linear-gradient(135deg, #fbbf24, #d4af37, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }

        .top-section p {
            color: rgba(255, 255, 255, 0.7);
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            max-width: 500px;
            line-height: 2;
        }

        /* === بخش دکمه‌های پایینی === */
        .buttons-section {
            position: relative;
            z-index: 1;
            padding: 2rem 1rem 3rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(1.5rem, 5vw, 4rem);
            flex-wrap: wrap;
        }

        /* === دکمه گرد === */
        .round-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .round-btn:hover {
            transform: translateY(-10px) scale(1.05);
        }

        .round-btn:active {
            transform: translateY(-5px) scale(1.02);
        }

        .btn-circle {
            width: clamp(120px, 25vw, 180px);
            height: clamp(120px, 25vw, 180px);
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(251, 191, 36, 0.1));
            border: 3px solid rgba(212, 175, 55, 0.5);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: 
                0 0 30px rgba(212, 175, 55, 0.2),
                inset 0 0 30px rgba(212, 175, 55, 0.1);
        }

        .btn-circle::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                transparent, 
                rgba(212, 175, 55, 0.3), 
                transparent 30%
            );
            animation: rotate 4s linear infinite;
        }

        .btn-circle::after {
            content: '';
            position: absolute;
            inset: 3px;
            border-radius: 50%;
            background: linear-gradient(135deg, #022c22, #064e3b);
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        .btn-icon {
            position: relative;
            z-index: 2;
            font-size: clamp(2.5rem, 6vw, 3.5rem);
        }

        .round-btn:hover .btn-circle {
            border-color: rgba(251, 191, 36, 0.8);
            box-shadow: 
                0 0 50px rgba(212, 175, 55, 0.4),
                inset 0 0 40px rgba(212, 175, 55, 0.2);
        }

        .btn-label {
            margin-top: 1rem;
            color: #fbbf24;
            font-size: clamp(0.85rem, 2.5vw, 1.1rem);
            font-weight: 700;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .round-btn:hover .btn-label {
            color: #fcd34d;
            text-shadow: 0 0 15px rgba(252, 211, 77, 0.5);
        }

        /* === ریسپانسیو - موبایل === */
        @media (max-width: 480px) {
            .buttons-section {
                gap: 1.5rem;
                padding-bottom: 2rem;
            }

            .btn-circle {
                width: 110px;
                height: 110px;
            }
        }

        /* === ریسپانسیو - تبلت به بالا === */
        @media (min-width: 768px) {
            .top-section {
                padding: 4rem 2rem;
            }

            .buttons-section {
                padding: 3rem 2rem 4rem;
            }
        }
    </style>
</head>
<body>

    <!-- بخش بالایی -->
    <div class="top-section">
        <h1>🕊️ یادبود خانوادگی کلیدری</h1>
        <p>به یاد عزیزان سفرکرده‌ای که نامشان تا ابد در قلب‌های ما زنده است</p>
    </div>

    <!-- بخش دکمه‌های پایینی -->
    <div class="buttons-section">
        
        <!-- دکمه حاجیه خانوم کلیدری -->
        <a href="https://klidari.ir/Hajiya-Khanum/home.html" class="round-btn">
            <div class="btn-circle">
                <span class="btn-icon">🕌</span>
            </div>
            <span class="btn-label">حاجیه خانوم کلیدری</span>
        </a>

        <!-- دکمه گل خانوم کلیدری -->
        <a href="https://klidari.ir/Gol-Khanum/home.html" class="round-btn">
            <div class="btn-circle">
                <span class="btn-icon">🌹</span>
            </div>
            <span class="btn-label">گل خانوم کلیدری</span>
        </a>

    </div>

</body>
</html>
