<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>قبله‌نمای هوشمند و اوقات شرعی</title>
    <!-- ===== FAVICON ===== -->
    <link rel="icon" type="image/jpg" href="/Hajiya-Khanum/icon/icon.webp">
    <link rel="apple-touch-icon" href="/Hajiya-Khanum/icon/icon.webp">
    <link rel="shortcut icon" href="/Hajiya-Khanum/icon/icon.webp">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.0.0/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <!-- ===== STYLESHEETS ===== -->
<link rel="stylesheet" href="/Hajiya-Khanum/css/global.css">
<link rel="stylesheet" href="/Hajiya-Khanum/css/qibla.css">
</head>
<body>

<section class="section">
    <div class="section-inner">
        
        <div class="header-title fade-in" style="animation-delay: 0.1s;">
            <h1 class="gold-gradient">قبله‌نما و اوقات شرعی</h1>
            <p>نمایشگر هوشمند با مکان‌یاب و ژیروسکوپ</p>
        </div>

        <div class="qibla-wrapper glass-panel fade-in" style="animation-delay: 0.2s;">
            <div class="phone-indicator">▲</div>
            
            <div class="compass-outer">
                <button id="startBtn" class="permission-btn">یافتن<br>موقعیت</button>

                <div class="compass-center"></div>
                <div class="compass-dial" id="compassDial">
                    <div class="compass-marks"></div>
                    <span class="direction-letter dir-n">N</span>
                    <span class="direction-letter dir-s">S</span>
                    <span class="direction-letter dir-e">E</span>
                    <span class="direction-letter dir-w">W</span>

                    <div class="qibla-pointer-container" id="qiblaPointer">
                        <div class="qibla-pointer">
                            <div class="kaaba-emoji">🕋</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="location-section">
                <div class="status-box" id="statusText">برای شروع، روی دکمه وسط قطب‌نما کلیک کنید.</div>
                
                <div class="location-display fade-in" id="locationBox">
                    <div class="location-icon">📍</div>
                    <div class="location-details">
                        <span id="cityNameText">--</span>
                        <span id="locationSourceText" class="location-source">--</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="prayerTimesGrid" class="prayer-grid fade-in" style="animation-delay: 0.4s;">
            <div class="glass-card time-card"><div class="prayer-name">...</div><div class="prayer-time">--:--</div></div>
            <div class="glass-card time-card"><div class="prayer-name">...</div><div class="prayer-time">--:--</div></div>
            <div class="glass-card time-card"><div class="prayer-name">...</div><div class="prayer-time">--:--</div></div>
            <div class="glass-card time-card"><div class="prayer-name">...</div><div class="prayer-time">--:--</div></div>
            <div class="glass-card time-card"><div class="prayer-name">...</div><div class="prayer-time">--:--</div></div>
        </div>

    </div>
</section>
<!-- ===== SCRIPTS ===== -->
<script src="/Hajiya-Khanum/js/qibla.js"></script>
<script src="/Hajiya-Khanum/js/loader.js"></script>
</body>
</html>
