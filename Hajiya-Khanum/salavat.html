<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>نذر صلوات | Salavat Counter</title>
<meta name="description" content="صلوات‌شمار حرفه‌ای برای آرامش روح عزیزان">
<meta name="keywords" content="صلوات, صلوات شمار, نذر, ذکر">
<meta name="author" content="Memorial Website">
<meta name="robots" content="index, follow">
<meta name="language" content="Persian">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<!-- ===== FAVICON ===== -->
    <link rel="icon" type="image/jpg" href="/icon/icon.webp">
    <link rel="apple-touch-icon" href="/icon/icon.webp">
    <link rel="shortcut icon" href="/icon/icon.webp">
<link href="https://cdn.jsdelivr.net/gh/rastikerdar/iran-nastaliq@v3.0.0/dist/iran-nastaliq.css" rel="stylesheet" type="text/css" />
<!-- ===== STYLESHEETS ===== -->
<link rel="stylesheet" href="/css/global.css">
<link rel="stylesheet" href="/css/salavat.css">
</head>
<body>

<section id="tab-salavat" class="salavat-section">
    <div class="salavat-bg"></div>
    <div class="salavat-wrap">
        <div class="salavat-header">
            <h2 class="salavat-title gold-gradient">نذر صلوات حرفه‌ای</h2>
            <p class="salavat-subtitle">با هر کلیک، صلواتی نثار روح آن عزیز سفر کرده کنید.</p>
        </div>
        
        <div class="salavat-circle">
            <div class="salavat-ring1 animate-spin-slow"></div>
            <div class="salavat-ring2 animate-spin-slow" style="animation-direction: reverse;"></div>
            <div class="salavat-ring3 animate-spin-slow" style="animation-duration: 30s;"></div>
            
            <button id="salavat-btn" onclick="addSalavat(event)" class="salavat-btn">
                <div class="salavat-btn-inner"></div>
                <span class="salavat-label">تعداد صلوات‌های شما</span>
                <span id="salavat-number" class="salavat-num">0</span>
                <span class="salavat-arabic">الّلهُمَّ صَلِّ عَلَی مُحَمَّدٍ وَ آلِ مُحَمَّد</span>
            </button>
        </div>
        
        <div class="salavat-footer">
            <div class="salavat-stat">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                          d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                </svg>
                <span>نذر شما برای آرامش روح عزیزان</span>
            </div>
            <button onclick="resetSalavat()" class="salavat-reset-btn">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                          d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                </svg>
                شروع مجدد
            </button>
        </div>
    </div>
</section>

<script src="/js/salavat.js"></script>
 <script src="/js/loader.js"></script>
</body>
</html>
