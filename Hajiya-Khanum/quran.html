<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>آوای ملکوتی قرآن | Quran Player</title>
<meta name="description" content="پخش آنلاین ۱۱۴ سوره قرآن کریم با تلاوت استاد عبدالباسط عبدالصمد">
<meta name="keywords" content="قرآن, قرآن کریم, ۱۱۴ سوره, عبدالباسط عبدالصمد, تلاوت قرآن">
<meta name="author" content="Memorial Website">
<meta name="robots" content="index, follow">
<meta name="language" content="Persian">
<!-- ===== FAVICON ===== -->
    <link rel="icon" type="image/jpg" href="/Hajiya-Khanum/icon/icon.webp">
    <link rel="apple-touch-icon" href="/Hajiya-Khanum/icon/icon.webp">
    <link rel="shortcut icon" href="/Hajiya-Khanum/icon/icon.webp">
<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.0.0/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
<!-- ===== STYLESHEETS ===== -->
<link rel="stylesheet" href="/Hajiya-Khanum/css/global.css">
<link rel="stylesheet" href="/Hajiya-Khanum/css/quran.css">
</head>
<body>

<section id="quran-page" class="section" style="padding: 3rem 1rem;">
    <div class="quran-wrap">
        <div class="quran-header">
            <h2 class="section-title gold-gradient" style="margin-bottom: 1rem;">آوای ملکوتی قرآن</h2>
            <p style="color: var(--emerald-200); font-size: 1rem;">۱۱۴ سوره مبارکه قرآن کریم با تلاوت استاد عبدالباسط عبدالصمد</p>
        </div>
        
        <div class="quran-player glass-panel">
            <div class="quran-side">
                <div class="quran-disc animate-pulse-glow" id="quranDisc">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" 
                              d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                    </svg>
                </div>
                <h3 id="quran-title" class="quran-title">سوره الفاتحة</h3>
                <p class="quran-artist">استاد عبدالباسط عبدالصمد</p>
                
                <audio id="quran-audio" preload="none"></audio>
                
                <div class="quran-progress-wrap">
                    <div class="quran-time">
                        <span id="q-current">00:00</span>
                        <span id="q-total">00:00</span>
                    </div>
                    <div class="quran-progress-bg" onclick="seekQuran(event)" id="q-progress-bg">
                        <div id="q-progress" class="quran-progress"></div>
                    </div>
                </div>
                
                <div class="quran-controls">
                    <button onclick="prevQuran()" class="quran-btn" title="سوره قبلی">
                        <svg fill="currentColor" viewBox="0 0 20 20">
                            <path d="M8.445 14.832A1 1 0 0010 14v-2.798l5.445 3.63A1 1 0 0017 14V6a1 1 0 00-1.555-.832L10 8.798V6a1 1 0 00-1.555-.832l-6 4a1 1 0 000 1.664l6 4z"/>
                        </svg>
                    </button>
                    <button onclick="toggleQuran()" class="quran-play-btn" id="quranPlayBtn">
                        <svg id="q-play-icon" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"/>
                        </svg>
                        <svg id="q-pause-icon" style="display:none;" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/>
                        </svg>
                    </button>
                    <button onclick="nextQuran()" class="quran-btn" title="سوره بعدی">
                        <svg fill="currentColor" viewBox="0 0 20 20">
                            <path d="M11.555 14.832A1 1 0 0010 14v-2.798l-5.445 3.63A1 1 0 013 14V6a1 1 0 011.555-.832L10 8.798V6a1 1 0 011.555-.832l6 4a1 1 0 010 1.664l-6 4z"/>
                        </svg>
                    </button>
                </div>
            </div>
            
            <div class="quran-list-side">
                <div class="quran-list-header">
                    <h4 class="quran-list-title">لیست ۱۱۴ سوره قرآن</h4>
                    <span class="quran-status">سرور آنلاین</span>
                </div>
                <ul id="quran-list" class="quran-list custom-scroll"></ul>
            </div>
        </div>
    </div>
</section>

<div id="toastContainer" class="toast-container"></div>

<!-- ===== SCRIPTS ===== -->
<script src="/Hajiya-Khanum/js/quran.js"></script>
<script src="/Hajiya-Khanum/js/loader.js"></script>

</body>
</html>
