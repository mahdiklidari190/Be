<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shahab Sange Background</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f1a 100%);
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }


        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            opacity: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: var(--max-opacity); transform: scale(1); }
        }

        .meteor-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .meteor {
            position: absolute;
            opacity: 0;
            animation: meteor-fall linear infinite;
        }


        .meteor-head {
            position: absolute;
            width: var(--head-size);
            height: var(--head-size);
            background: radial-gradient(circle, 
                rgba(192, 192, 192, 1) 0%, 
                rgba(135, 206, 235, 0.8) 40%, 
                rgba(65, 105, 225, 0.4) 70%, 
                transparent 100%);
            border-radius: 50%;
            box-shadow: 
                0 0 6px 2px rgba(192, 192, 192, 0.8),
                0 0 12px 4px rgba(135, 206, 235, 0.6),
                0 0 20px 8px rgba(65, 105, 225, 0.3);
            z-index: 2;
        }


        .meteor-tail {
            position: absolute;
            top: 50%;
            right: 100%;
            transform: translateY(-50%);
            width: var(--tail-length);
            height: var(--tail-width);
            background: linear-gradient(90deg, 
                rgba(192, 192, 192, 0.9) 0%, 
                rgba(176, 196, 222, 0.7) 20%, 
                rgba(135, 206, 235, 0.5) 50%, 
                rgba(65, 105, 225, 0.2) 80%, 
                transparent 100%);
            border-radius: 0 50% 50% 0;
            filter: blur(1px);
            z-index: 1;
        }

        @keyframes meteor-fall {
            0% {
                opacity: 0;
                transform: translate(0, 0) rotate(var(--angle));
            }
            5% {
                opacity: 1;
            }
            85% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(var(--travel-x), var(--travel-y)) rotate(var(--angle));
            }
        }


        .content {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #e0e0e0;
            text-align: center;
            padding: 2rem;
        }

        .content h1 {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            text-shadow: 0 0 20px rgba(192, 192, 192, 0.3);
            margin-bottom: 1rem;
        }

        .content p {
            font-size: 1.2rem;
            color: #a0a0b0;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>

    <div class="stars" id="stars"></div>
    <script>
        // Configuration
        const METEOR_COUNT = 25;
        const STAR_COUNT = 150;


        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < STAR_COUNT; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 0.5;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            star.style.setProperty('--max-opacity', Math.random() * 0.7 + 0.3);
            star.style.animationDelay = Math.random() * 5 + 's';
            starsContainer.appendChild(star);
        }
        
        function createMeteor(index) {
            const meteor = document.createElement('div');
            meteor.className = 'meteor';
            
            const headSize = Math.random() * 4 + 2;
            const tailLength = Math.random() * 150 + 80;
            const tailWidth = Math.random() * 2 + 1;
            const startX = Math.random() * 80 - 10;
            const startY = Math.random() * 60 - 10;
            const travelX = Math.random() * 40 + 30;
            const travelY = Math.random() * 40 + 30;
            const duration = Math.random() * 2 + 1.5;
            const delay = Math.random() * 15;
            const angle = Math.random() * 10 + 35;
            
            meteor.style.left = startX + '%';
            meteor.style.top = startY + '%';
            meteor.style.setProperty('--head-size', headSize + 'px');
            meteor.style.setProperty('--tail-length', tailLength + 'px');
            meteor.style.setProperty('--tail-width', tailWidth + 'px');
            meteor.style.setProperty('--travel-x', travelX + '%');
            meteor.style.setProperty('--travel-y', travelY + '%');
            meteor.style.setProperty('--angle', angle + 'deg');
            meteor.style.animationDuration = duration + 's';
            meteor.style.animationDelay = delay + 's';
            const head = document.createElement('div');
            head.className = 'meteor-head';
            
            const tail = document.createElement('div');
            tail.className = 'meteor-tail';
            
            meteor.appendChild(tail);
            meteor.appendChild(head);
            
            return meteor;
        }
    </script>
</body>
</html>
