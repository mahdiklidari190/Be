<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>فـال حـافـظ | Hafez Fortune</title>
<meta name="description" content="تفأل به دیوان حضرت حافظ شیرازی با ۴۹۵ غزل کامل همراه با تفسیر">
<meta name="keywords" content="فال حافظ, تفأل, دیوان حافظ, حضرت حافظ, فال">
<meta name="author" content="Memorial Website">
<meta name="robots" content="index, follow">
<meta name="language" content="Persian">
<!-- ===== FAVICON ===== -->
    <link rel="icon" type="image/jpg" href="/Hajiya-Khanum/icon/icon.webp">
    <link rel="apple-touch-icon" href="/Hajiya-Khanum/icon/icon.webp">
    <link rel="shortcut icon" href="/Hajiya-Khanum/icon/icon.webp">
<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.0.0/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
<link href="https://cdn.jsdelivr.net/gh/rastikerdar/iran-nastaliq@v3.0.0/dist/iran-nastaliq.css" rel="stylesheet" type="text/css" />
   <!-- ===== STYLESHEETS ===== -->
    <!-- استایل‌های اصلی و مشترک سایت -->
    <link rel="stylesheet" href="/Hajiya-Khanum/css/global.css">
    <!-- استایل مخصوص صفحه خانه (اختیاری - اگر جدا کرده باشید) -->
    <link rel="stylesheet" href="/Hajiya-Khanum/css/hafez.css">
</head>
<body>

<section id="tab-hafez" class="hafez-section">
    <div class="hafez-bg"></div>
    <div class="hafez-inner">
        <div style="margin-bottom: 2rem;">
            <h2 class="hafez-title gold-gradient">فـال حـافـظ</h2>
            <p class="hafez-subtitle">نیت کنید و برای آرامش روح ایشان، تفألی به دیوان حضرت لسان‌الغیب بزنید. (شامل ۴۹۵ غزل کامل)</p>
        </div>
        <div class="hafez-box glass-panel">
            <button id="hafez-btn" onclick="getHafezFal()" class="hafez-btn animate-pulse-glow">
                نیت کردم، فال بـگیر
            </button>
            
            <!-- لودینگ -->
            <div id="hafez-loading" style="display:none; width:100%; text-align:center; padding:2rem;">
                <div style="font-size:1.1em; color:var(--gold-400); font-family:'Vazirmatn', sans-serif;">⏳ در حال دریافت فال از دیوان حافظ...</div>
            </div>
            
            <div id="hafez-result" style="display:none; width:100%; text-align:center;">
                <!-- عنوان غزل -->
                <div id="hafez-title" style="color:var(--gold-400); font-size:1.2rem; font-weight:700; margin-bottom:0.5rem; font-family:'Vazirmatn', sans-serif;"></div>
                <!-- منبع -->
                <div id="hafez-source" style="color:var(--emerald-200); font-size:0.85rem; margin-bottom:1.5rem; font-family:'Vazirmatn', sans-serif;"></div>
                <!-- شعر -->
                <div class="hafez-poem text-shadow-lg" id="hafez-poem"></div>
                <!-- تفسیر -->
                <div class="hafez-tafsir-box glass-card">
                    <h4 class="hafez-tafsir-title">تفسیر فال شما:</h4>
                    <p id="hafez-tafsir" class="hafez-tafsir-text"></p>
                </div>
                <button onclick="resetHafez()" class="hafez-reset">فال مجدد</button>
            </div>
        </div>
    </div>
</section>
 <script src="/Hajiya-Khanum/js/hafez.js"></script>
 <script src="/Hajiya-Khanum/js/loader.js"></script>
</body>
</html>
