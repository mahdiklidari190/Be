<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحه یافت نشد | 404</title>
    
    <!-- فونت وزیرمتن -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.0.0/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #022c22 0%, #064e3b 50%, #022c22 100%);
            overflow-x: hidden;
            position: relative;
            padding: 2rem 1rem;
        }

        /* === ذرات تزئینی پس‌زمینه === */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            z-index: 0;
            animation: float 8s ease-in-out infinite;
        }

        body::before {
            width: 300px;
            height: 300px;
            background: #d4af37;
            top: -100px;
            right: -100px;
        }

        body::after {
            width: 250px;
            height: 250px;
            background: #fbbf24;
            bottom: -80px;
            left: -80px;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        /* === ذرات شناور تزئینی === */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(212, 175, 55, 0.5);
            border-radius: 50%;
            animation: particleFloat 15s linear infinite;
        }

        .particle:nth-child(1) { left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 25%; animation-delay: 2s; }
        .particle:nth-child(3) { left: 45%; animation-delay: 4s; }
        .particle:nth-child(4) { left: 65%; animation-delay: 1s; }
        .particle:nth-child(5) { left: 80%; animation-delay: 3s; }
        .particle:nth-child(6) { left: 90%; animation-delay: 5s; }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(1);
                opacity: 0;
            }
        }

        /* === محتوای اصلی === */
        .error-container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 600px;
            animation: fadeInDown 1s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* === عدد 404 === */
        .error-code {
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 900;
            background: linear-gradient(135deg, #fbbf24, #d4af37, #f59e0b, #d4af37);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 1rem;
            position: relative;
            animation: gradientShift 4s ease infinite, glow 3s ease-in-out infinite;
            text-shadow: 0 0 60px rgba(212, 175, 55, 0.3);
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes glow {
            0%, 100% {
                filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.3));
            }
            50% {
                filter: drop-shadow(0 0 40px rgba(212, 175, 55, 0.6));
            }
        }

        /* === آیکون خطا === */
        .error-icon {
            font-size: clamp(3rem, 8vw, 4.5rem);
            margin-bottom: 1rem;
            animation: bounceIn 0.8s ease-out 0.3s both;
            display: inline-block;
        }

        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0.3);
            }
            50% {
                opacity: 1;
                transform: scale(1.1);
            }
            70% {
                transform: scale(0.95);
            }
            100% {
                transform: scale(1);
            }
        }

        /* === عنوان خطا === */
        .error-title {
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            background: linear-gradient(135deg, #fbbf24, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            font-weight: 800;
            animation: fadeIn 1s ease-out 0.5s both;
        }

        /* === متن توضیح === */
        .error-message {
            color: rgba(255, 255, 255, 0.75);
            font-size: clamp(0.95rem, 2.5vw, 1.15rem);
            line-height: 2;
            margin-bottom: 2.5rem;
            animation: fadeIn 1.5s ease-out 0.7s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* === دکمه بازگشت === */
        .back-btn {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: bounceIn 0.8s ease-out 0.9s both;
        }

        .back-btn:hover {
            transform: translateY(-10px) scale(1.05);
        }

        .back-btn:active {
            transform: translateY(-5px) scale(1.02);
        }

        .btn-circle {
            width: clamp(140px, 30vw, 200px);
            height: clamp(140px, 30vw, 200px);
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(251, 191, 36, 0.1));
            border: 3px solid rgba(212, 175, 55, 0.5);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: 
                0 0 30px rgba(212, 175, 55, 0.2),
                inset 0 0 30px rgba(212, 175, 55, 0.1);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 
                    0 0 30px rgba(212, 175, 55, 0.2),
                    inset 0 0 30px rgba(212, 175, 55, 0.1);
            }
            50% {
                box-shadow: 
                    0 0 40px rgba(212, 175, 55, 0.3),
                    inset 0 0 35px rgba(212, 175, 55, 0.15);
            }
        }

        .btn-circle::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                transparent, 
                rgba(212, 175, 55, 0.3), 
                transparent 30%
            );
            animation: rotate 4s linear infinite;
        }

        .btn-circle::after {
            content: '';
            position: absolute;
            inset: 3px;
            border-radius: 50%;
            background: linear-gradient(135deg, #022c22, #064e3b);
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        .btn-icon {
            position: relative;
            z-index: 2;
            font-size: clamp(3rem, 7vw, 4rem);
            transition: all 0.3s ease;
        }

        .back-btn:hover .btn-circle {
            border-color: rgba(251, 191, 36, 0.8);
            box-shadow: 
                0 0 50px rgba(212, 175, 55, 0.4),
                inset 0 0 40px rgba(212, 175, 55, 0.2);
        }

        .back-btn:hover .btn-icon {
            transform: scale(1.2);
            filter: drop-shadow(0 0 10px rgba(251, 191, 36, 0.8));
        }

        .btn-label {
            margin-top: 1rem;
            color: #fbbf24;
            font-size: clamp(1rem, 2.8vw, 1.25rem);
            font-weight: 700;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .back-btn:hover .btn-label {
            color: #fcd34d;
            text-shadow: 0 0 15px rgba(252, 211, 77, 0.5);
            transform: translateY(-5px);
        }

        /* === خط تزئینی === */
        .divider {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            margin: 1.5rem auto;
            animation: fadeIn 2s ease-out 0.6s both;
        }

        /* === ریسپانسیو - موبایل === */
        @media (max-width: 480px) {
            body {
                padding: 1.5rem 1rem;
            }

            .error-code {
                margin-bottom: 0.5rem;
            }

            .error-message {
                margin-bottom: 2rem;
            }

            .back-btn:hover {
                transform: translateY(-5px) scale(1.03);
            }
        }

        /* === افکت لمسی برای موبایل === */
        @media (hover: none) and (pointer: coarse) {
            .back-btn:active .btn-circle {
                border-color: rgba(251, 191, 36, 0.8);
                box-shadow: 
                    0 0 50px rgba(212, 175, 55, 0.4),
                    inset 0 0 40px rgba(212, 175, 55, 0.2);
            }

            .back-btn:active .btn-icon {
                transform: scale(1.1);
            }

            .back-btn:active .btn-label {
                color: #fcd34d;
            }
        }
    </style>
</head>
<body>

    <!-- ذرات شناور تزئینی -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- محتوای اصلی -->
    <div class="error-container">
        <div class="error-icon">🔍</div>
        <div class="error-code">404</div>
        <h1 class="error-title">صفحه مورد نظر یافت نشد</h1>
        <div class="divider"></div>
        <p class="error-message">
            به نظر می‌رسد صفحه‌ای که به دنبال آن هستید وجود ندارد یا آدرس آن تغییر کرده است.
            <br>
            می‌توانید از طریق دکمه زیر به صفحه اصلی بازگردید.
        </p>

        <!-- دکمه بازگشت -->
        <a href="https://klidari.ir/" class="back-btn">
            <div class="btn-circle">
                <span class="btn-icon">🏠</span>
            </div>
            <span class="btn-label">بازگشت به صفحه اصلی</span>
        </a>
    </div>

</body>
</html>
